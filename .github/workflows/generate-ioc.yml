name: Daily IOC Generator

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate IOC HTML + JSON
        env:
          ABUSEIPDBKEY: ${{ secrets.ABUSEIPDBKEY }}
          URLSCANIO: ${{ secrets.URLSCANIO }}
          URLHAUS: ${{ secrets.URLHAUS }}
        run: python3 fetch_iocs.py

      - name: Commit and push changes
        run: |
          git config user.name "leonorabot"
          git config user.email "actions@github.com"

          git add docs/daily-ioc/

          git diff --cached --quiet && exit 0

          git commit -m "Daily IOC update - $(date +'%Y-%m-%d')"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}
