<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Shenanigans Blog</title>

  <style>
    html, body {
      overflow-x: hidden; /* sprječava horizontalni scroll */
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #121212;
      color: #ffffff;
      background-image: radial-gradient(circle at top, #1a1a1a 0%, #000000 100%);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ff4500;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      margin: 0;
      padding: 0;
      flex-wrap: wrap; /* omogućuje prelamanje na mobitelu */
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      background-color: #ff4500;
      left: 0;
      bottom: -4px;
      transition: width 0.3s;
    }

    nav a:hover::after {
      width: 100%;
    }

    main {
      padding: 4rem 2rem;
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      color: #ff4500;
      margin-bottom: 2rem;
    }

    .intro {
      margin-top: 2rem;
      line-height: 2;
      font-size: 1.2rem;
      color: #cccccc;
    }

    .intro a {
      color: #ff4500;
      text-decoration: none;
      font-weight: bold;
    }

    .intro a:hover {
      text-decoration: underline;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 3rem;
      color: #ff4500;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    pre, code {
      white-space: pre-wrap;
      word-wrap: break-word;
      word-break: break-word;
    }

    /* 📱 MOBILE FIX — identično kao homepage */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      nav ul {
        flex-direction: column;
        gap: 0.5rem;
        width: 100%;
        margin-top: 1rem;
      }

      main {
        padding: 2rem 1rem;
      }

      h1 {
        font-size: 1.6rem;
      }

      .intro {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">LM</div>
    <nav>
      <ul>
        <li><a href="/bio/">Bio</a></li>
        <li><a href="/security-news/">Security News</a></li>
        <li><a href="/security-shenanigans/">Security Shenanigans</a></li>
        <li><a href="/daily-ioc/">Daily IOC</a></li>
        <li><a href="/contact/">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Security Shenanigans Blog</h1>

    <div class="intro">

      <p>
        🇭🇷  
        <a href="/security-shenanigans/article-hr.html">
          Dobrodošli na moj sigurnosni blog — klikni na <strong>Hrvatski</strong> za čitanje članka.
        </a>
      </p>

      <p>
        🇬🇧  
        <a href="/security-shenanigans/article-en.html">
          Welcome to my security blog — click on <strong>English</strong> to read the article.
        </a>
      </p>

    </div>

    <a class="back-link" href="/">← Back to homepage</a>
  </main>

</body>
</html>
