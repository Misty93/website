<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Shenanigans Blog</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #121212;
      color: #ffffff;
      background-image: radial-gradient(circle at top, #1a1a1a 0%, #000000 100%);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ff4500;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      background-color: #ff4500;
      left: 0;
      bottom: -4px;
      transition: width 0.3s;
    }

    nav a:hover::after {
      width: 100%;
    }

    main {
      padding: 4rem 2rem;
      max-width: 900px;
      margin: 0 auto;
      text-align: justify;
    }

    h1 {
      text-align: center;
      color: #ff4500;
      margin-bottom: 2rem;
    }

    .lang-switch {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 1.3rem;
    }

    .lang-switch a {
      color: #ff4500;
      text-decoration: none;
      font-weight: bold;
      margin: 0 0.5rem;
    }

    .lang-switch a:hover {
      text-decoration: underline;
    }

    .intro {
      margin-top: 2rem;
      line-height: 1.8;
      font-size: 1.1rem;
      color: #cccccc;
      text-align: left;
    }

    .intro a {
      color: #ff4500;
      text-decoration: none;
      font-weight: bold;
    }

    .intro a:hover {
      text-decoration: underline;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 3rem;
      color: #ff4500;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">LM</div>
    <nav>
      <ul>

      </ul>
    </nav>

  <main>

    <div class="intro">
      <p>
        <a href="/security-shenanigans/article-hr.html">

        </a>
      </p>

      <p>

          Welcome to my security blog. Less hype, more reality.
        </a>
      </p>
    </div>

    <a class="back-link" href="/">← Back to homepage</a>
  </main>
